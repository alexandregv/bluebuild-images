---
# yaml-language-server: $schema=https://schema.blue-build.org/module-v1.json

type: dnf
repos:
  nonfree: rpmfusion
  copr:
    - scottames/ghostty
    - chenxiaolong/sbctl
install:
  packages:
    - tmux
    - screen # For switch/router serial port
    - ghostty

    # H264 on Firefox
    #- gstreamer1-plugins-good-extras
    #- gstreamer1-plugins-ugly

    # Yubikey & U2F
    - yubikey-manager
    - pam-u2f
    - pamu2fcfg

    - krb5-workstation # Kerberos (kinit etc)

    # Network
    - wireshark # The flatpak version can't do capture
    - wireguard-tools
    #- tcpdump
    #- nmap

    #- freerdp

    - podman-compose
    - podman-docker

    - efibootmgr
    - efitools
    - mokutil
    - keyutils
    - pesign
    - sbsigntools
    - systemd-ukify
    - sbctl
remove:
  packages:
    # Remove firefox, in favor of the flatpak
    - firefox
    - firefox-langpacks
